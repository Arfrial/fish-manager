<!DOCTYPE html>
<html>
<head>
    <title>{{ "Edit Catch" if catch else "Add Catch" }}</title>
    <style>
    body {
        font-family: 'Segoe UI', sans-serif;
        margin: 0;
        padding: 40px 20px;
        background: radial-gradient(circle at 20% 30%, #4facfe 0%, transparent 40%),
                    radial-gradient(circle at 80% 70%, #00c6ff 0%, transparent 40%),
                    linear-gradient(135deg, #1e3c72, #2a5298);
        background-attachment: fixed;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: white;
    }

    .form-card {
        background: rgba(255,255,255,0.12);
        backdrop-filter: blur(18px);
        padding: 40px;
        border-radius: 22px;
        width: 520px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.35);
        transition: transform 0.2s ease;
    }

    .form-card:hover {
        transform: translateY(-4px);
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 2rem;
        font-weight: 700;
    }

    label {
        font-weight: 600;
        display: block;
        margin-top: 18px;
        margin-bottom: 6px;
        font-size: 0.95rem;
        opacity: 0.9;
    }

    input, textarea {
        width: 100%;
        padding: 12px 14px;
        border-radius: 10px;
        border: none;
        background: rgba(255,255,255,0.2);
        color: white;
        font-size: 0.95rem;
        transition: background 0.2s ease, box-shadow 0.2s ease;
    }

    input::placeholder,
    textarea::placeholder {
        color: rgba(255,255,255,0.6);
    }

    input:focus,
    textarea:focus {
        outline: none;
        background: rgba(255,255,255,0.3);
        box-shadow: 0 0 0 2px rgba(174,233,255,0.6);
    }

    textarea {
        resize: vertical;
        min-height: 90px;
    }

    .button-group {
        margin-top: 30px;
        display: flex;
        justify-content: space-between;
        gap: 15px;
    }

    button, .secondary {
        flex: 1;
        padding: 12px;
        border-radius: 10px;
        border: none;
        font-weight: 600;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
        transition: all 0.2s ease;
    }

    .primary {
        background: linear-gradient(135deg, #4facfe, #00c6ff);
        color: white;
        box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    .primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .secondary {
        background: rgba(255,255,255,0.15);
        color: white;
    }

    .secondary:hover {
        background: rgba(255,255,255,0.25);
    }

    @media (max-width: 600px) {
        .form-card {
            width: 100%;
            padding: 30px;
        }
    }
</style>
</head>
<body>

<div class="form-card">
    <h1>{{ "Edit Catch" if catch else "Add Catch" }}</h1>

    <form method="POST">
        <label>Species</label>
        <input type="text" name="species"
               value="{{ catch[1] if catch else '' }}" required>

        <label>Location</label>
        <input type="text" name="location"
               value="{{ catch[2] if catch else '' }}" required>

        <label>Date</label>
        <input type="date" name="catch_date"
               value="{{ catch[3] if catch else '' }}" required>

        <label>Weight (lbs)</label>
        <input type="number" step="0.01" name="weight_lbs"
               value="{{ catch[4] if catch else '' }}">

        <label>Length (inches)</label>
        <input type="number" step="0.01" name="length_in"
               value="{{ catch[5] if catch else '' }}">

        <label>Notes</label>
        <textarea name="notes">{{ catch[6] if catch else '' }}</textarea>

        <label>Image URL</label>
        <input type="text" name="image_url"
               value="{{ catch[7] if catch else '' }}">

        <div class="button-group">
            <a href="/" class="secondary" style="text-decoration:none; padding:10px 18px; border-radius:8px;">Cancel</a>
            <button type="submit" class="primary">
                {{ "Update Catch" if catch else "Add Catch" }}
            </button>
        </div>
    </form>
</div>

</body>
</html>
